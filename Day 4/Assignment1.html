<!DOCTYPE html>
<html>
<head>
    <title>Responsive Webpage</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: lightblue;
        }

        nav {
            background-color: black;
            padding: 10px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 18px;
        }

        h1 {
            font-size: 32px;
            text-align: center;
        }

        p {
            text-align: center;
            font-size: 18px;
        }

        @media (max-width: 600px) {

            body {
                background-color: lightgreen;   
            }

            h1 {
                font-size: 22px;   
            }

            p {
                font-size: 14px;   
            }

            nav a {
                display: block;   
                margin: 10px 0;
            }
        }

    </style>
</head>

<body>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Contact</a>
</nav>

<h1>Responsive Web Design</h1>
<p>This page changes layout on mobile screens.</p>

</body>
</html>
