<!DOCTYPE html>
<html>
<head>
    <title>Mini Expense Tracker</title>
    <style>
        body {
            font-family: Arial;
            background: #f3f4f6;
            padding: 20px;
        }

        h2 {
            color: #4f46e5;
        }

        input {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 8px 12px;
            margin: 5px;
            background: #4f46e5;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #3730a3;
        }

        table {
            margin-top: 20px;
            border-collapse: collapse;
            width: 100%;
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: center;
        }

        th {
            background: #e0e7ff;
        }
    </style>
</head>
<body>

<h2>Mini Expense Tracker</h2>

<input type="text" id="title" placeholder="Expense Title">
<input type="number" id="amount" placeholder="Amount">
<input type="date" id="date">

<br>

<button onclick="addExpense()">Add Expense</button>
<button onclick="viewExpenses()">View Expenses</button>

<div id="output"></div>

<script>

let db;

// OPEN DATABASE
let request = indexedDB.open("ExpenseDB", 1);

// CREATE TABLE (objectStore)
request.onupgradeneeded = function(event) {
    db = event.target.result;
    db.createObjectStore("expenses", { keyPath: "id", autoIncrement: true });
};

// SUCCESS
request.onsuccess = function(event) {
    db = event.target.result;
};

// ERROR
request.onerror = function(event) {
    alert("Database Error");
};

// INSERT (add)
function addExpense() {

    let title = document.getElementById("title").value;
    let amount = document.getElementById("amount").value;
    let date = document.getElementById("date").value;

    let transaction = db.transaction("expenses", "readwrite");
    let store = transaction.objectStore("expenses");

    let expense = { title: title, amount: amount, date: date };

    let addRequest = store.add(expense);

    addRequest.onsuccess = function() {
        alert("Expense Added");
    };

    addRequest.onerror = function() {
        alert("Insert Error");
    };

    transaction.onerror = function() {
        alert("Transaction Error");
    };
}

// SELECT (getAll)
function viewExpenses() {

    let transaction = db.transaction("expenses", "readonly");
    let store = transaction.objectStore("expenses");

    let getRequest = store.getAll();

    getRequest.onsuccess = function() {

        let data = getRequest.result;

        let output = "<table>";
        output += "<tr><th>ID</th><th>Title</th><th>Amount</th><th>Date</th><th>Delete</th></tr>";

        data.forEach(function(item) {
            output += "<tr>";
            output += "<td>" + item.id + "</td>";
            output += "<td>" + item.title + "</td>";
            output += "<td>" + item.amount + "</td>";
            output += "<td>" + item.date + "</td>";
            output += "<td><button onclick='deleteExpense(" + item.id + ")'>Delete</button></td>";
            output += "</tr>";
        });

        output += "</table>";

        document.getElementById("output").innerHTML = output;
    };

    getRequest.onerror = function() {
        alert("Select Error");
    };
}

// DELETE
function deleteExpense(id) {

    let transaction = db.transaction("expenses", "readwrite");
    let store = transaction.objectStore("expenses");

    let deleteRequest = store.delete(id);

    deleteRequest.onsuccess = function() {
        alert("Deleted Successfully");
        viewExpenses();
    };

    deleteRequest.onerror = function() {
        alert("Delete Error");
    };

    transaction.onerror = function() {
        alert("Transaction Error");
    };
}

</script>

</body>
</html>
