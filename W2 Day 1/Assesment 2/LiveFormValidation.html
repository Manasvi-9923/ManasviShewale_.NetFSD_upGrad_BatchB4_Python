<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>
<body>

<h2>Registration Form</h2>

Name:
<input type="text" id="name" onchange="checkName()">
<p id="nameMsg"></p>

Email:
<input type="text" id="email" onchange="checkEmail()">
<p id="emailMsg"></p>

Age:
<input type="number" id="age" onchange="checkAge()">
<p id="ageMsg"></p>

<br>
<button onclick="saveData()">Submit</button>

<p id="result"></p>

<script>

function checkName() {
    var name = document.getElementById("name").value;

    if (name == "") {
        document.getElementById("nameMsg").innerHTML = "Name cannot be empty";
    } else {
        document.getElementById("nameMsg").innerHTML = "";
    }
}

function checkEmail() {
    var email = document.getElementById("email").value;

    if (email.indexOf("@") == -1) {
        document.getElementById("emailMsg").innerHTML = "Email must contain @";
    } else {
        document.getElementById("emailMsg").innerHTML = "";
    }
}

function checkAge() {
    var age = document.getElementById("age").value;

    if (age <= 18) {
        document.getElementById("ageMsg").innerHTML = "Age must be above 18";
    } else {
        document.getElementById("ageMsg").innerHTML = "";
    }
}

function saveData() {

    var name = document.getElementById("name").value;
    var email = document.getElementById("email").value;
    var age = document.getElementById("age").value;

    if (name != "" && email.indexOf("@") != -1 && age > 18) {

        sessionStorage.setItem("name", name);
        sessionStorage.setItem("email", email);
        sessionStorage.setItem("age", age);

        document.getElementById("result").innerHTML = "Data Stored Successfully";
    } else {
        document.getElementById("result").innerHTML = "Please fill form correctly";
    }
}

</script>

</body>
</html>
