<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transform Array</title>
</head><body>
    <h1>Transform Array</h1>
    <p id="output"></p>
    <script>
        let arr = [1, 2, 3, 4, 5];
        let transformedArr = arr.map(x => x * 2);
        document.getElementById('output').textContent = transformedArr.join(', ');
    </script>
</html>
