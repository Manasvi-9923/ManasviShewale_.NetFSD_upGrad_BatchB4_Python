<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Marks Analyzer</title>
</head>
<body>

    <h1>Student Marks Analyzer</h1>
    <div id="output"></div>

    <script>
        // Store student marks
        const marks = [78, 92, 45, 67, 88];

        // Calculate total using reduce()
        const calculateTotal = (arr) =>
            arr.reduce((sum, mark) => sum + mark, 0);

        // Calculate average
        const calculateAverage = (arr) =>
            calculateTotal(arr) / arr.length;

        // Determine pass/fail
        const getResult = (avg) =>
            avg >= 50 ? "Pass " : "Fail ";

        // Convert marks to grades using map()
        const convertToGrades = (arr) =>
            arr.map(mark =>
                mark >= 90 ? "A+" :
                mark >= 75 ? "A" :
                mark >= 60 ? "B" :
                mark >= 50 ? "C" : "F"
            );

        // Execute logic
        const total = calculateTotal(marks);
        const average = calculateAverage(marks);
        const result = getResult(average);
        const grades = convertToGrades(marks);

        //  Display output using template literals
        document.getElementById("output").innerHTML = `
            <p><strong>Marks:</strong> ${marks.join(", ")}</p>
            <p><strong>Total:</strong> ${total}</p>
            <p><strong>Average:</strong> ${average.toFixed(2)}</p>
            <p><strong>Result:</strong> ${result}</p>
            <p><strong>Grades:</strong> ${grades.join(", ")}</p>
        `;
    </script>

</body>
</html>
