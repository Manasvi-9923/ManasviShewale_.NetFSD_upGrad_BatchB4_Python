<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Mark Analyzer</title>

  <style>
    
    body {
      font-family: Arial, sans-serif;
      background-color: #eef2f7;
      text-align: center; 
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #2c3e50;
      font-size: 32px;
      margin-bottom: 20px;
    }

    #output {
      margin: auto; 
      max-width: 700px;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 12px;
      border: 1px solid #aaa;
    }

    th {
      background-color: #2d89ef;
      color: white;
      font-size: 18px;
    }

    td {
      font-size: 16px;
      color: #333;
    }

    .pass {
      color: #27ae60; 
      font-weight: bold;
    }

    .fail {
      color: #c0392b; 
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>Student Mark Analyzer</h1>
  <div id="output"></div>

  <script src="StudentMarkAnalyzer.js"></script>
</body>
</html>
