<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Responsive Demo</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #f5f7ff;
}
header {
  background: #4f46e5;
  color: white;
  padding: 15px;
}
nav {
  display: flex;
  /* justify-content: space-around;
  flex-wrap: wrap; */
}
nav a {
  color: white;
  padding: 8px;
}

nav a:hover {
  background: #6c6ef5;
}
section {
  padding: 20px;
}
.home {
  background: #e0e7ff;
  text-align: center;
}

.products {
  background: #d1fae5;
}
.product-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}

.card {
  background: white;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
}
.contact {
  background: #ffe4e6;
}
.contact-box {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, textarea {
  padding: 10px;
  border: 1px solid #ccc;
}
button {
  padding: 10px;
  background: #4f46e5;
  color: white;
  font-weight: bold;
}
@media (min-width: 600px) {
  .product-grid {
    grid-template-columns: repeat(3, 1fr);
  }
}
</style>
</head>

<body>

<header>
  <nav>
    <a href="#home">Home</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact Us</a>
  </nav>
</header>

<section id="home"class="home">
  <h1>Welcome</h1>
  <p> To Our EShopping Center.</p>
</section>

<section id="products"class="products">
  <h2>Electronic Gadget</h2>

  <div class="product-grid">
    <div class="card">Mobile</div>
    <div class="card">Desktop</div>
    <div class="card">Laptop</div>
    <div class="card">Earphone</div>
    <div class="card">AudioSpeaker</div>
    <div class="card">Tablet</div>
  </div>
</section>

<section id="contact"class="contact">
  <h2>Contact Us</h2>

  <div class="contact-box">
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Email">
    <textarea placeholder="Message"></textarea>
    <button>Send</button>
  </div>
</section>

</body>
</html>
