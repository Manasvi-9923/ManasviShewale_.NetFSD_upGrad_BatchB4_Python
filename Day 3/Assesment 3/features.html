<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Product Features</title>

<style>

body {
  font-family: "Verdana", sans-serif;
  background-color: #f4f6ff;
  margin: 40px;
}
.feature-section {
  max-width: 650px;
  margin: auto;
  background: #ffffff;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.feature-section h2 {
  text-align: center;
  color: #4338ca;
  margin-bottom: 20px;
}
.feature-list {
  list-style-type: disc;
  padding-left: 20px;
}
.feature-list li {
  background-color: #e0e7ff;
  color: #1e293b;
  border: 2px solid #4338ca;
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 8px;
  font-size: 16px;
  transition: 0.3s;
}
.feature-list li:hover {
  background-color: #4338ca;
  color: white;
  cursor: pointer;
  transform: translateX(5px);
}

</style>
</head>

<body>

<section class="feature-section">

<h2>Key Product Features</h2>

<ul class="feature-list">

<li>Fast performance for smooth user experience</li>

<li>Modern and easy-to-use interface design</li>

<li>Secure system with strong data protection</li>

<li>Works seamlessly across multiple devices</li>

<li>Simple customization to match user needs</li>

</ul>

</section>

</body>
</html>
