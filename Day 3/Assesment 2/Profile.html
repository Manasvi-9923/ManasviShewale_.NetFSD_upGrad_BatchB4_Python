<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile Card</title>

<style>

body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #eef2ff;
  font-family: Arial, Helvetica, sans-serif;
}
.profile-card {
  background: white;
  padding: 25px;
  border: 3px solid #4f46e5;
  margin: 20px;
  border-radius: 15px;
  width: 320px;
  text-align: center;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}
.profile-card h2 {
  margin-bottom: 5px;

  font-size: 24px;
  font-weight: bold;
  letter-spacing: 1px;
}

.role {
  color: #4f46e5;
  font-size: 16px;
  font-weight: 600;
  margin-bottom: 15px;
  text-decoration: underline;
}

.description {
  font-size: 14px;
  line-height: 1.6;
  letter-spacing: 0.5px;
  margin-bottom: 20px;
  color: #333;
}

.contact-btn {

  background: #4f46e5;
  color: white;
  border: none;
  padding: 10px 20px;
  font-size: 14px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.3s;
}
.contact-btn:hover {
  background: #3730a3;
  /* transform: scale(1.05); */
}

</style>
</head>

<body>

<div class="profile-card">

  <h2>Manasvi Shewale</h2>

  <div class="role">Frontend Developer</div>

  <p class="description">
    Passionate about building responsive web interfaces using HTML and CSS.
    Focused on clean design, typography, and user-friendly layouts.
  </p>

  <a href="contactme.html" class="contact-btn">Contact Me</a>

</div>

</body>
</html>
