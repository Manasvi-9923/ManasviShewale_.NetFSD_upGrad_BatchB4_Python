<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact Me</title>

<style>

body {
  font-family: Arial, sans-serif;
  background: #f4f6ff;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Contact box */

.contact-container {
  background: white;
  padding: 25px;
  border: 2px solid #4f46e5;
  border-radius: 12px;
  width: 320px;

  display: flex;
  flex-direction: column;
  gap: 12px;
}

h2 {
  text-align: center;
  color: #4f46e5;
}

/* Inputs */

input, textarea {
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 6px;
  font-size: 14px;
}

/* Button */

button {
  padding: 10px;
  background: #4f46e5;
  color: white;
  border: none;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #3730a3;
}

</style>
</head>

<body>

<form class="contact-container">

<h2>Contact Me</h2>

<input type="text" placeholder="Your Name" required>

<input type="email" placeholder="Your Email" required>

<textarea rows="4" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</body>
</html>
