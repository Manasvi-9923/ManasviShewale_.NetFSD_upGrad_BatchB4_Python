<!-- LEVEL – 1 (Problem 1): Interactive Feedback Button
 
Scenario:
A startup company wants a simple interactive webpage where users can click a button to submit feedback and instantly see a confirmation message without refreshing the page.
 
Requirements
• Create a webpage with a “Submit Feedback” button.
• When clicked, display a confirmation message dynamically.
• Use JavaScript event listeners to handle the click event.
 
️ Technical Constraints
• Use plain HTML, CSS, and JavaScript.
• Event handling must use addEventListener().
• No external frameworks allowed.
 
Expectations:
• Proper DOM manipulation.
• Clean and readable code.
 
 
Learning Outcome
• Understand browser event handling.
• Learn DOM manipulation basics. -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #f0f8ff;
    }

    h1 {
      color: #333;
    }

    textarea {
      width: 300px;
      height: 100px;
      margin-bottom: 10px;
      padding: 8px;
      font-size: 14px;
      border-radius: 5px;
      border: 1px solid #ccc;
      resize: none;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    button:hover {
      background-color: #45a049;
    }

    #confirmation {
      margin-top: 20px;
      font-size: 16px;
      color: #007700;
      display: none; 
    }
  </style>
</head>
<body>

  <h1>Feedback Page</h1>
  <textarea id="feedbackInput" placeholder="Type your feedback here"></textarea>
  <br>
  <button id="feedbackBtn">Submit Feedback</button>

  <!-- Confirmation message -->
  <div id="confirmation"></div>

  <script>
        //select the dom element
    const feedbackBtn = document.getElementById('feedbackBtn');
    const feedbackInput = document.getElementById('feedbackInput');
    const confirmation = document.getElementById('confirmation');
      //add event listener to the button
    feedbackBtn.addEventListener('click', () => {
      const userFeedback = feedbackInput.value.trim(); 

      if(userFeedback === "") {
        confirmation.style.color = "red";
        confirmation.textContent = "Please type some feedback!";
      } else {
        confirmation.style.color = "#007700";
        confirmation.textContent = `Thank you! Your feedback has been submitted`;
        feedbackInput.value = ""; 
      }

      confirmation.style.display = "block";

      // Hide the message after 4 seconds
      setTimeout(() => {
        confirmation.style.display = "none";
        
      }, 4000);
    });
  </script>

</body>
</html>
