<!DOCTYPE html>
<html>
<head>
  <title>Mini Product Search</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    input {
      padding: 8px;
      width: 300px;
      margin-bottom: 15px;
    }

    .product {
      padding: 8px;
      border: 1px solid #ccc;
      margin-bottom: 5px;
      cursor: pointer;
    }

    .no-result {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>Mini Product Search</h2>

  <input type="text" id="searchInput" placeholder="Search product..." />

  <div id="productList"></div>

  <script src="app.js"></script>

</body>
</html>
