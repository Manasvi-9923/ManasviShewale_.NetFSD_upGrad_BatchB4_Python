<!DOCTYPE html>
<html>
<head>
    <title>Student Feedback Form</title>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
        }

        h2 {
            text-align: center;
        }

        form {
            width: 350px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0px 0px 10px gray;
        }

        input, select, textarea {
            width: 95%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: rgb(33, 33, 208);
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: rgb(75, 14, 207);
        }

        #message {
            text-align: center;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>Student Feedback Form</h2>

<form id="feedbackform">

    Name:<br>
    <input type="text" id="name"><br><br>

    Email:<br>
    <input type="text" id="email"><br><br>

    Course Rating:<br>
    <select id="rating">
        <option value="">Select Rating</option>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
    </select><br><br>

    Comments:<br>
    <textarea id="comments"></textarea><br><br>

    <button type="button" id="submitBtn">Submit</button>

</form>

<div id="message"></div>

<script>

$(document).ready(function(){

    $("#submitBtn").click(function(){

        var name = $("#name").val();
        var email = $("#email").val();

        if(name === "" || email === ""){

            $("#message")
                .html("Please enter both Name and Email.")
                .css("color", "red");

        } else {

            $("#message")
                .html("Thank you for your feedback, " + name + "!")
                .css("color", "green");

            $("#feedbackform")[0].reset();
        }

    });

});

</script>

</body>
</html>
