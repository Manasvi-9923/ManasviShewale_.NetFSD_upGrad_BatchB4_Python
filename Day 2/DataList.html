<!DOCTYPE html>
<html>
<head>
    <title>Suggestion Example</title>
</head>
<body>

<h3>Choose your favorite language</h3>

<input list="languages" placeholder="Type or select a language">

<datalist id="languages">
    <option value="Java">
    <option value="Python">
    <option value="JavaScript">
    <option value="C++">
</datalist>

</body>
</html>
