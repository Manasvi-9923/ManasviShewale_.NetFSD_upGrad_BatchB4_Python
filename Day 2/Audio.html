<!DOCTYPE html>
<html>
<head>
    <title>Audio Element Example</title>
</head>
<body>

<h3>Add Audio</h3>

<input list="sounds" placeholder="Add and find">

<datalist id="sounds">
    <option value="Sound 1">
    <option value="Sound 2">
</datalist>

<br><br>

<audio controls>
    <source src="sound.mp3" type="audio/mpeg">
    Your browser is not supporting audio.
</audio>

</body>
</html>
